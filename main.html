<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitFlow - Главная</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'app-bg': '#cfc7b8',
                        'card-bg': '#fefdfb',
                        'dark-charcoal': '#232220',
                        'text-secondary': '#6B7280',
                        'accent-purple': '#e9d5ff',
                        'accent-green': '#d4edda',
                        'accent-blue': '#d1e7fd',
                        'accent-pink': '#f8d7da',
                    },
                    borderRadius: {
                        '4xl': '2rem',
                        '5xl': '2.5rem',
                    },
                },
            },
        }
    </script>
    <style>
        .btn-grad {
            background-image: linear-gradient(to right, #c681f4 0%, #d38080 51%, #DAE2F8 100%);
            padding: 15px 45px;
            text-align: center;
            text-transform: uppercase;
            transition: 0.5s;
            background-size: 200% auto;
            color: white;
            box-shadow: 0 0 20px #eee;
            border-radius: 10px;
            display: block;
            font-weight: bold;
        }

        .btn-grad:hover {
            background-position: right center;
            color: #fff;
            text-decoration: none;
        }
    </style>
</head>

<body class="bg-app-bg">

    <div id="app" class="max-w-2xl mx-auto pb-28">
        <!-- Шапка с изображением -->
        <header class="relative mb-6">
            <div class="aspect-[16/9] w-full">
                <img src="./images/main1.jpg" alt="FitFlow" class="w-full h-full object-cover shadow-lg">
            </div>
            <!-- Градиент для плавного перехода -->
            <div class="absolute bottom-0 left-0 w-full h-1/2 bg-gradient-to-t from-app-bg to-transparent">
            </div>
        </header>

        <div class="p-6">
            <!-- Блок кнопок — 4 кнопки -->
            <div class="space-y-3">
                <a href="./welcome.html" class="btn-grad w-full">
                    Приветствие
                </a>
                <a href="./hands.html" class="btn-grad w-full">
                    Тренировки
                </a>
                <a href="./recipes.html" class="btn-grad w-full">
                    Рецепты
                </a>
                <a href="./aptechka.html" class="btn-grad w-full">
                    Здоровая стройность
                </a>
            </div>
        </div>

    </div>

    <!-- Нижнее меню -->
    <footer
        class="fixed bottom-0 left-0 right-0 max-w-2xl mx-auto bg-white/80 backdrop-blur-sm shadow-[0_-10px_30px_-15px_rgba(0,0,0,0.1)] rounded-t-4xl">
        <div class="flex justify-around items-center h-20">
            <a href="./main.html" class="flex flex-col items-center gap-1 text-purple-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="currentColor" viewBox="0 0 24 24">
                    <path
                        d="M12.71,2.29a1,1,0,0,0-1.42,0l-9,9a1,1,0,0,0,0,1.42A1,1,0,0,0,3,13H4v7a1,1,0,0,0,1,1H9a1,1,0,0,0,1-1V16a1,1,0,0,1,1-1h2a1,1,0,0,1,1,1v4a1,1,0,0,0,1,1h4a1,1,0,0,0,1-1V13h1a1,1,0,0,0,.71-1.71Z" />
                </svg>
                <span class="text-xs font-bold">На главную</span>
            </a>
            <a href="https://t.me/MyuppyTeam" target="_blank"
                class="flex flex-col items-center gap-1 text-text-secondary hover:text-dark-charcoal transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9 5.25h.008v.008H12v-.008z" />
                </svg>
                <span class="text-xs font-semibold">Поддержка</span>
            </a>
        </div>
    </footer>

</body>

</html>
