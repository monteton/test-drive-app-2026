<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitFlow - Пресс: Тренировка 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'app-bg': '#cfc7b8',
                        'card-bg': '#fefdfb',
                        'dark-charcoal': '#232220',
                        'text-secondary': '#6B7280',
                        'accent-purple': '#f0c7ff',
                        'accent-green': '#e7fcbb',
                        'accent-beige': '#d5cdbe',
                    },
                    borderRadius: {
                        '4xl': '2rem',
                        '5xl': '2.5rem',
                    },
                },
            },
        }
    </script>
    <link rel="stylesheet" href="./index.css">
</head>

<body class="bg-app-bg">

    <div id="app" class="max-w-2xl mx-auto pb-28">
        <!-- Видеоплеер -->
        <div class="bg-card-bg rounded-4xl shadow-xl p-6">

            <div class="relative bg-black/80 aspect-[9/16] mt-4 rounded-2xl overflow-hidden">
                <video class="w-full h-full" controls playsinline>
                    <source
                        src="https://file-storage.bothelp.io/myuppy/e7/e70f/e70f45884392de112aeed3d154f090b0/%D0%BF%D1%80%D0%B5%D1%81%D1%81%20%D1%82%D1%80%D0%B5%D0%BD%D0%B8%D1%80%D0%BE%D0%B2%D0%BA%D0%B01.mp4"
                        type="video/mp4">
                    Ваш браузер не поддерживает видео.
                </video>
            </div>
        </div>

        <!-- Информация о тренировке -->
        <div class="p-6 space-y-6">
            <div id="workout-info" class="bg-card-bg rounded-4xl shadow-xl p-6">
                <!-- Заголовок и детали будут вставлены сюда -->
            </div>

            <!-- Список упражнений -->
            <div class="bg-card-bg rounded-4xl shadow-xl p-6">
                <h2 class="text-2xl font-bold text-dark-charcoal mb-4">Упражнения</h2>
                <div id="exercises-list" class="space-y-2">
                    <!-- Упражнения будут вставлены сюда -->
                </div>
            </div>
        </div>
    </div>

    <!-- Нижнее меню -->
    <footer
        class="fixed bottom-0 left-0 right-0 max-w-2xl mx-auto bg-white/80 backdrop-blur-sm shadow-[0_-10px_30px_-15px_rgba(0,0,0,0.1)] rounded-t-4xl">
        <div class="flex justify-around items-center h-20">
            <a href="./main.html" class="flex flex-col items-center gap-1 text-purple-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="currentColor" viewBox="0 0 24 24">
                    <path
                        d="M12.71,2.29a1,1,0,0,0-1.42,0l-9,9a1,1,0,0,0,0,1.42A1,1,0,0,0,3,13H4v7a1,1,0,0,0,1,1H9a1,1,0,0,0,1-1V16a1,1,0,0,1,1-1h2a1,1,0,0,1,1,1v4a1,1,0,0,0,1,1h4a1,1,0,0,0,1-1V13h1a1,1,0,0,0,.71-1.71Z" />
                </svg>
                <span class="text-xs font-bold">На главную</span>
            </a>
            <a href="https://t.me/MyuppyTeam" target="_blank"
                class="flex flex-col items-center gap-1 text-text-secondary hover:text-dark-charcoal transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9 5.25h.008v.008H12v-.008z" />
                </svg>
                <span class="text-xs font-semibold">Поддержка</span>
            </a>
        </div>
    </footer>

    <script>
        const workout = {
            id: 1,
            title: 'Тренировка 1',
            duration: 20,
            exercisesCount: 5,
            category: 'Пресс',
            color: 'purple',
            exercises: [
                { name: 'Вакуум', duration: '5-7 раз' },
                { name: 'Планка', duration: '3/45 секунд' },
                { name: 'Русский твист', duration: '3 подхода по 20 раз' },
                { name: 'Лодочка', duration: '10 глубоких вдохов-выдохов 3 подхода' },
                { name: 'Тянемся к носкам', duration: '2 подхода 20 раз' }
            ]
        };

        document.addEventListener('DOMContentLoaded', () => {
            const workoutInfoContainer = document.getElementById('workout-info');
            const exercisesListContainer = document.getElementById('exercises-list');

            document.title = `FitFlow - Пресс: ${workout.title}`;

            workoutInfoContainer.innerHTML = `
                <h1 class="text-3xl font-bold text-dark-charcoal">${workout.title}</h1>
                <p class="text-text-secondary mt-2 font-medium">
                    ${workout.duration} мин &bull; ${workout.exercisesCount} упр.
                </p>
            `;

            workout.exercises.forEach((ex, index) => {
                const exerciseItem = document.createElement('div');
                exerciseItem.className = 'exercise-item flex items-center space-x-4 p-4 rounded-2xl transition-colors duration-300';

                // Применяем цвет для подсветки
                if (index === 0) {
                    exerciseItem.classList.add('bg-accent-purple');
                }

                exerciseItem.innerHTML = `
                    <div class="flex-grow">
                        <p class="font-bold text-dark-charcoal">${ex.name}</p>
                        <p class="text-text-secondary">${ex.duration}</p>
                    </div>
                    <div class="exercise-number text-2xl font-bold ${index === 0 ? 'text-purple-600' : 'text-gray-300'} transition-colors">
                        ${String(index + 1).padStart(2, '0')}
                    </div>
                `;

                exercisesListContainer.appendChild(exerciseItem);
            });
        });
    </script>

    <script>
        // Логика для кастомного плеера вынесена для применения ко всем страницам
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('workout-video');
            const playButtonOverlay = document.getElementById('play-button-overlay');

            if (video && playButtonOverlay) {
                const togglePlay = () => {
                    if (video.paused) {
                        video.play();
                    } else {
                        video.pause();
                    }
                };

                playButtonOverlay.addEventListener('click', togglePlay);
                video.addEventListener('click', togglePlay);

                video.addEventListener('play', () => {
                    playButtonOverlay.style.opacity = '0';
                    playButtonOverlay.style.pointerEvents = 'none';
                });

                video.addEventListener('pause', () => {
                    playButtonOverlay.style.opacity = '1';
                    playButtonOverlay.style.pointerEvents = 'auto';
                });
            }
        });
    </script>

</body>

</html>
