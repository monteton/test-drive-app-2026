<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Активация здоровой стройности</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'app-bg': '#cfc7b8',
                        'dark-charcoal': '#232220',
                    },
                },
            },
        }
    </script>
    <style>
        #pdf-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding-bottom: 100px;
        }

        canvas {
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border-radius: 8px;
            max-width: 100%;
        }
    </style>
</head>

<body class="bg-app-bg min-h-screen">

    <!-- Шапка с кнопкой назад -->
    <div
        class="fixed top-0 left-0 right-0 bg-white/90 backdrop-blur-sm shadow-sm z-50 px-4 py-3 flex items-center justify-between">
        <a href="./main.html" class="flex items-center gap-2 text-dark-charcoal font-bold">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Назад
        </a>
        <span class="font-semibold text-sm truncate max-w-[150px]">Здоровая стройность</span>
        <div class="w-16"></div> <!-- Spacer for centering -->
    </div>

    <div id="pdf-container" class="pt-20 px-4">
        <div id="loading" class="text-center mt-10 text-dark-charcoal font-medium animate-pulse">
            Загрузка документа...
        </div>
    </div>

    <script>
        // Инициализация PDF.js
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const url = './КАК_АКТИВИРОВАТЬ_ЗДОРОВУЮ_СТРОЙНОСТЬ_Наталья_Макаренко3.pdf';
        const container = document.getElementById('pdf-container');
        const loading = document.getElementById('loading');

        async function renderPDF() {
            try {
                const loadingTask = pdfjsLib.getDocument(url);
                const pdf = await loadingTask.promise;

                loading.style.display = 'none';

                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    const page = await pdf.getPage(pageNum);

                    // Рендерим в высоком качестве (масштаб 3)
                    const scale = 3;
                    const viewport = page.getViewport({ scale: scale });

                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');

                    // Устанавливаем реальные размеры canvas (высокое разрешение)
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    // Стили для адаптивности (canvas будет занимать 100% ширины контейнера)
                    canvas.style.width = '100%';
                    canvas.style.height = 'auto';

                    const renderContext = {
                        canvasContext: context,
                        viewport: viewport
                    };

                    container.appendChild(canvas);
                    await page.render(renderContext).promise;
                }
            } catch (error) {
                console.error('Error rendering PDF:', error);
                loading.textContent = 'Ошибка при загрузке PDF. Попробуйте обновить страницу.';
                loading.classList.remove('animate-pulse');
                loading.classList.add('text-red-600');
            }
        }

        renderPDF();
    </script>
</body>

</html>
